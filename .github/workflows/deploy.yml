# Name of the workflow that will appear in the GitHub Actions tab
name: Deploy to GitHub Pages

# Define the events that trigger this workflow
on:
  # Triggers the workflow every time code is pushed to the 'main' branch
  push:
    branches: [ main ]

# Grants the necessary permissions to allow the GitHub Action to deploy to GitHub Pages securely
permissions:
  contents: read      # Allows the action to read the repository content
  pages: write        # Allows the action to publish the site to GitHub Pages
  id-token: write     # Required to securely verify the deployment source

jobs:
  # --- JOB 1: BUILD ---
  # This job prepares the environment, installs dependencies, and compiles the Astro site
  build:
    runs-on: ubuntu-latest # The virtual environment where the job will run
    steps:
      - name: Checkout
        # Downloads a copy of your repository onto the runner (virtual machine)
        uses: actions/checkout@v4

      - name: Setup Node
        # Installs Node.js, which is required to run npm commands
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0 # Specifies the exact Node.js version to use
          cache: 'npm'          # Enables caching for npm packages to speed up future builds
          # Tells the cache where to look for the lockfile (since it is inside a subfolder)
          cache-dependency-path: './Content/package-lock.json'

      - name: Install dependencies
        # Runs 'npm install' to download all the required packages for the project
        run: npm install
        # Specifies that this command must be executed inside the 'Content' directory
        working-directory: ./Content

      - name: Build Astro
        # Runs the build script to compile the Astro project into static HTML/CSS/JS files
        run: npm run build
        # Ensures the build command also runs in the correct subfolder
        working-directory: ./Content

      - name: Upload artifact
        # Packages the built site into an "artifact" so it can be passed to the deploy job
        uses: actions/upload-pages-artifact@v3
        with:
          # Points to the 'dist' folder generated by Astro, which contains the final website files
          path: ./Content/dist

  # --- JOB 2: DEPLOY ---
  # This job takes the artifact generated by the build job and publishes it to GitHub Pages
  deploy:
    needs: build # Ensures this job only starts AFTER the 'build' job has finished successfully
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      # Dynamically retrieves the final URL of your live site once deployed
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        # The official action that handles the actual publication to the GitHub Pages servers
        uses: actions/deploy-pages@v4